# deploy/haproxy-fragment.cfg — merged into /etc/haproxy/haproxy.cfg by
# deploy/scripts/install-fragment.sh. The script appends the BLOCK section
# verbatim and prints manual-edit instructions for the FRONTEND section.

# ─── BEGIN line-of-bugs BLOCK (appended) ───
cache lob-static
    total-max-size 256
    max-object-size 2097152
    max-age 2592000

backend line-of-bugs
    option httpchk GET /api/healthz
    http-check expect status 200
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-For %[src]
    http-request cache-use lob-static if { path_beg /api/thumb/ /api/medium/ }
    # Canonical host: redirect www → apex (301), preserve path + query
    http-request redirect prefix https://line-of-bugs.com code 301 if { hdr(host) -i www.line-of-bugs.com }
    server next 127.0.0.1:3000 check inter 5s fall 3 rise 2
    http-response cache-store lob-static if { path_beg /api/thumb/ /api/medium/ }
    compression algo gzip
    # NOTE: application/json intentionally excluded. /api/healthz is the
    # primary JSON payload on this backend (<100 B), where gzip framing
    # overhead exceeds any saving.
    compression type text/html text/plain text/css text/javascript application/javascript image/svg+xml
# ─── END line-of-bugs BLOCK ───

# ═══ FRONTEND EDITS — manual, applied by install-fragment.sh prompt ═══
#
# In the existing  `frontend https-in`  block, make these changes:
#
# 1. Extend the `bind *:443 ssl ...` line to add the new cert + ALPN:
#       crt /etc/haproxy/certs/line-of-bugs.com.pem \
#       alpn h2,http/1.1
#    (ALPN may already be present; if so, just add the crt path.)
#
# 2. Add these response headers near the top of the frontend, AFTER any
#    existing http-response set-header lines:
#       http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
#       http-response set-header X-Content-Type-Options "nosniff"
#       http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
#       http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=()"
#
# 3. Add ACLs + use_backend just BEFORE `default_backend ntfy`:
#       acl is_lob hdr(host) -i line-of-bugs.com
#       acl is_lob hdr(host) -i www.line-of-bugs.com
#       use_backend line-of-bugs if is_lob
